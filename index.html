<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer & Compressor</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-color: #f9fafb;
            color: #1f2937;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        input[type="number"], input[type="file"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .output-section {
            margin-top: 2rem;
            display: none;
            text-align: center;
        }
        img#outputImage {
            max-width: 100%;
            height: auto;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        #downloadBtn {
            display: inline-block;
            background-color: #059669;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-weight: bold;
        }
        #downloadBtn:hover {
            background-color: #047857;
        }
        .status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Image Resizer</h2>
        
        <div class="form-group">
            <label for="imageUpload">Upload Image:</label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <div class="form-group">
            <label for="maxWidth">Max Width (px):</label>
            <input type="number" id="maxWidth" value="1200" min="100">
        </div>

        <div class="form-group">
            <label for="maxHeight">Max Height (px):</label>
            <input type="number" id="maxHeight" value="1200" min="100">
        </div>

        <div class="form-group">
            <label for="maxSizeKB">Target Max File Size (KB):</label>
            <input type="number" id="maxSizeKB" value="500" min="10">
        </div>

        <button onclick="processImage()">Resize & Compress</button>

        <div class="status" id="statusText"></div>

        <div class="output-section" id="outputSection">
            <h3>Result:</h3>
            <img id="outputImage" alt="Resized Image">
            <div>
                <a id="downloadBtn" download="resized-image.jpg">Download Image</a>
            </div>
        </div>
    </div>

    <script>
        function processImage() {
            const fileInput = document.getElementById('imageUpload');
            const maxWidth = parseInt(document.getElementById('maxWidth').value);
            const maxHeight = parseInt(document.getElementById('maxHeight').value);
            const maxSizeKB = parseInt(document.getElementById('maxSizeKB').value);
            const statusText = document.getElementById('statusText');
            const outputSection = document.getElementById('outputSection');
            const outputImage = document.getElementById('outputImage');
            const downloadBtn = document.getElementById('downloadBtn');

            if (fileInput.files.length === 0) {
                statusText.innerText = "Please select an image first.";
                statusText.style.color = "red";
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // 1. Calculate new dimensions while keeping aspect ratio
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    if (height > maxHeight) {
                        width = Math.round((width * maxHeight) / height);
                        height = maxHeight;
                    }

                    // 2. Draw image on canvas
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    
                    // Fill with white background (prevents transparent PNGs turning black in JPEG)
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);

                    // 3. Compress iteratively to meet target KB size
                    let quality = 1.0;
                    let dataUrl = canvas.toDataURL('image/jpeg', quality);
                    
                    // Approximate Base64 size to KB
                    const getKB = (data) => Math.round((data.length * (3/4)) / 1024);
                    
                    let currentSizeKB = getKB(dataUrl);

                    // Reduce quality by 0.05 steps until it fits the target size or hits rock bottom (0.1)
                    while (currentSizeKB > maxSizeKB && quality > 0.1) {
                        quality -= 0.05;
                        dataUrl = canvas.toDataURL('image/jpeg', quality);
                        currentSizeKB = getKB(dataUrl);
                    }

                    // 4. Update UI
                    outputImage.src = dataUrl;
                    downloadBtn.href = dataUrl;
                    outputSection.style.display = 'block';
                    
                    statusText.style.color = "green";
                    statusText.innerText = `Success! New Dimensions: ${width}x${height}px | Final Size: ~${currentSizeKB} KB (Quality: ${Math.round(quality * 100)}%)`;
                };
                img.src = event.target.result;
            };

            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
